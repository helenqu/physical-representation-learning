defaults:
  - dataset: active_matter
  - model: conv_small
  - ft: frozen

dataset:
  num_frames: 16

model:
  objective: "jepa"
  dims: [16, 32, 64, 128, 128]
  num_res_blocks: [3, 3, 3, 9, 3]

ft:
  run_name: "activematter-jepa-frozen-eval"

out_path: "./checkpoints"
cache_path: "./dataset_cache"
